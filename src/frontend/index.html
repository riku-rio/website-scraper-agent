<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Scraper Agent</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
    }

    .chat-toggle {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: #111827;
      color: white;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .chat-widget {
      position: fixed;
      right: 24px;
      bottom: 100px;
      width: 380px;
      max-width: calc(100vw - 48px);
      height: 560px;
      max-height: calc(100vh - 130px);
      background: white;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-widget.open {
      display: flex;
    }

    .chat-header {
      background: #111827;
      color: white;
      padding: 16px;
    }

    .chat-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .chat-header p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #d1d5db;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #f9fafb;
    }

    .message {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user {
      background: #dbeafe;
      margin-left: 32px;
      white-space: pre-wrap;
    }

    .message.agent {
      background: white;
      border: 1px solid #e5e7eb;
      margin-right: 32px;
    }

    .message.agent p {
      margin: 0 0 8px;
    }

    .message.agent p:last-child {
      margin-bottom: 0;
    }

    .message.agent h1,
    .message.agent h2,
    .message.agent h3,
    .message.agent h4 {
      margin: 12px 0 6px;
      font-weight: 600;
    }

    .message.agent h1 { font-size: 18px; }
    .message.agent h2 { font-size: 16px; }
    .message.agent h3 { font-size: 15px; }
    .message.agent h4 { font-size: 14px; }

    .message.agent ul,
    .message.agent ol {
      margin: 6px 0;
      padding-left: 22px;
    }

    .message.agent li {
      margin-bottom: 3px;
    }

    .message.agent code {
      background: #f3f4f6;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 13px;
      font-family: Consolas, Monaco, "Courier New", monospace;
    }

    .message.agent pre {
      background: #1f2937;
      color: #f3f4f6;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.45;
      margin: 8px 0;
    }

    .message.agent pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: inherit;
    }

    .message.agent a {
      color: #2563eb;
      text-decoration: underline;
    }

    .message.agent blockquote {
      margin: 8px 0;
      padding: 6px 14px;
      border-left: 4px solid #d1d5db;
      color: #4b5563;
      background: #f9fafb;
      border-radius: 4px;
    }

    .message.agent img {
      max-width: 100%;
      border-radius: 6px;
      margin: 8px 0;
    }

    .message.agent hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 12px 0;
    }

    .message.agent table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
      font-size: 13px;
    }

    .message.agent th,
    .message.agent td {
      border: 1px solid #d1d5db;
      padding: 6px 10px;
      text-align: left;
    }

    .message.agent th {
      background: #f3f4f6;
      font-weight: 600;
    }

    .chat-form {
      padding: 14px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }

    .chat-form input,
    .chat-form textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .chat-form textarea {
      resize: none;
      height: 76px;
    }

    .chat-form button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      background: #111827;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .chat-form button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <button class="chat-toggle" id="chatToggle">💬</button>

  <div class="chat-widget" id="chatWidget">
    <div class="chat-header">
      <h2>Website Scraper Agent</h2>
      <p>Ask questions about any website</p>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message agent">
        Hi! Enter a website URL and ask me what you want to know.
      </div>
    </div>

    <form class="chat-form" id="chatForm">
      <input
        id="urlInput"
        type="url"
        placeholder="https://books.toscrape.com"
        required
      />

      <textarea
        id="questionInput"
        placeholder="Summarize this website"
        required
      ></textarea>

      <button id="sendButton" type="submit">Ask Agent</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>

  <script>
    const SSE_URL = "http://127.0.0.1:8000/chat/stream";

    const chatToggle = document.getElementById("chatToggle");
    const chatWidget = document.getElementById("chatWidget");
    const chatForm = document.getElementById("chatForm");
    const chatMessages = document.getElementById("chatMessages");
    const urlInput = document.getElementById("urlInput");
    const questionInput = document.getElementById("questionInput");
    const sendButton = document.getElementById("sendButton");

    // chatToggle.addEventListener("click", () => {
    //   chatWidget.classList.toggle("open");
    // });

    chatToggle.addEventListener("click", () => {
      window.location.href = "./agent.html";
    });

    function addUserMessage(text) {
      const message = document.createElement("div");
      message.className = "message user";
      message.textContent = text;
      chatMessages.appendChild(message);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addAgentContainer() {
      const message = document.createElement("div");
      message.className = "message agent";
      chatMessages.appendChild(message);
      return message;
    }

    function renderMarkdown(container, markdown) {
      const html = marked.parse(markdown);
      container.innerHTML = DOMPurify.sanitize(html);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const url = urlInput.value.trim();
      const question = questionInput.value.trim();

      if (!url || !question) return;

      addUserMessage(`${question}\n\n${url}`);
      questionInput.value = "";

      const agentEl = addAgentContainer();
      agentEl.textContent = "Thinking...";
      sendButton.disabled = true;
      sendButton.textContent = "Working...";

      let markdownBuffer = "";
      let errorMessage = "";
      let sseBuffer = "";

      try {
        const response = await fetch(SSE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "text/event-stream",
          },
          body: JSON.stringify({ url, question }),
        });

        if (!response.ok) {
          throw new Error("Request failed");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let doneStreaming = false;

        while (!doneStreaming) {
          const { done, value } = await reader.read();
          if (done) break;

          sseBuffer += decoder.decode(value, { stream: true });
          sseBuffer = sseBuffer.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
          const parts = sseBuffer.split("\n\n");
          sseBuffer = parts.pop() || "";

          for (const part of parts) {
            const lines = part.split("\n");
            let eventType = "";
            let eventData = "";

            for (const line of lines) {
              if (line.startsWith("event: ")) {
                eventType = line.slice(7).trim();
              } else if (line.startsWith("data: ")) {
                eventData += line.slice(5).replace(/^ /, "") + "\n";
              }
            }

            if (eventData.endsWith("\n")) {
              eventData = eventData.slice(0, -1);
            }

            if (eventType === "message" && eventData) {
              markdownBuffer += eventData;
              renderMarkdown(agentEl, markdownBuffer);
            } else if (eventType === "done" || eventData === "[DONE]") {
              doneStreaming = true;
              break;
            } else if (eventType === "error" && eventData) {
              errorMessage = eventData;
              throw new Error(eventData);
            }
          }
        }
      } catch (error) {
        agentEl.textContent = errorMessage
          ? errorMessage
          : "Something went wrong. Make sure the FastAPI server is running.";
      } finally {
        sendButton.disabled = false;
        sendButton.textContent = "Ask Agent";
      }
    });
  </script>
</body>
</html>
