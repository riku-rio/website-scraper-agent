<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Scraper Agent</title>
  <meta name="description" content="Ask any question about a website and get an AI-powered streamed answer." />

  <style>
    /* == Reset == */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
    }

    /* == Floating trigger button == */
    #chatToggle {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 1000;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: #111827;
      color: #fff;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    #chatToggle:hover {
      transform: scale(1.08);
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.34);
    }

    /* == Backdrop == */
    #modalBackdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1100;
      background: rgba(10, 12, 20, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: fadeIn 0.22s ease;
    }
    #modalBackdrop.open { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* == Modal shell == */
    #agentModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1200;
      align-items: center;
      justify-content: center;
      padding: 5vh 5vw;
      pointer-events: none;
    }
    #agentModal.open {
      display: flex;
      pointer-events: auto;
    }

    .modal-box {
      width: 90vw;
      height: 85vh;
      max-width: 1200px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideUp 0.26s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* == Modal header == */
    .modal-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 24px;
      background: #111827;
      color: #fff;
      flex-shrink: 0;
    }

    .modal-header-text {
      text-align: center;
    }

    .modal-header-text h2 {
      font-size: 18px;
      font-weight: 700;
    }
    .modal-header-text p {
      margin-top: 3px;
      font-size: 13px;
      color: #9ca3af;
    }

    #closeModal {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #closeModal:hover { background: rgba(255, 255, 255, 0.22); }

    /* == Form strip == */
    .agent-form {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
      flex-shrink: 0;
    }

    .form-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 180px;
    }

    .form-field label {
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-field input,
    .form-field textarea {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      color: #111827;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-field input:focus,
    .form-field textarea:focus { border-color: #111827; }

    .form-field textarea {
      resize: none;
      height: 66px;
    }

    .form-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    #sendButton {
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      background: #111827;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    #sendButton:disabled { opacity: 0.55; cursor: not-allowed; }

    #thinkingToggle {
      display: none;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #111827;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      align-items: center;
      gap: 7px;
    }
    #thinkingToggle.visible { display: inline-flex; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    /* == Split content area == */
    .modal-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Agent progress sidebar */
    .progress-sidebar {
      width: 260px;
      min-width: 220px;
      border-right: 1px solid #e5e7eb;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .progress-sidebar h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    #progressList {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      margin: 0;
      list-style: none;
    }

    #progressList li {
      font-size: 13px;
      color: #374151;
      line-height: 1.5;
      padding: 7px 0;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    #progressList li:last-child { border-bottom: none; }
    #progressList li::before {
      content: ">";
      color: #9ca3af;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Answer panel */
    .answer-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .answer-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    #errorBox {
      color: #b91c1c;
      background: #fee2e2;
      border: 1px solid #fecaca;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    #errorBox.visible { display: block; }

    #answerPlaceholder {
      color: #9ca3af;
      font-size: 15px;
      padding-top: 24px;
    }

    #answer {
      line-height: 1.7;
      font-size: 15px;
      color: #111827;
    }

    #answer h1, #answer h2, #answer h3, #answer h4 {
      margin: 20px 0 8px;
      font-weight: 700;
    }
    #answer h1 { font-size: 22px; }
    #answer h2 { font-size: 18px; }
    #answer h3 { font-size: 16px; }
    #answer h4 { font-size: 14px; }
    #answer p { margin: 0 0 12px; }
    #answer ul, #answer ol { padding-left: 24px; margin: 6px 0 14px; }
    #answer li { margin-bottom: 5px; }
    #answer code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 5px;
      font-family: Consolas, Monaco, "Courier New", monospace;
      font-size: 13px;
    }
    #answer pre {
      background: #1f2937;
      color: #f9fafb;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 10px 0;
    }
    #answer pre code { background: transparent; padding: 0; color: inherit; font-size: 13px; }
    #answer a { color: #2563eb; text-decoration: underline; }
    #answer blockquote {
      margin: 8px 0;
      padding: 8px 16px;
      border-left: 4px solid #d1d5db;
      color: #4b5563;
      background: #f9fafb;
      border-radius: 4px;
    }
    #answer table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
    #answer th, #answer td { border: 1px solid #d1d5db; padding: 8px 10px; text-align: left; }
    #answer th { background: #f3f4f6; font-weight: 600; }
    #answer img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
    #answer hr { border: none; border-top: 1px solid #e5e7eb; margin: 16px 0; }

    /* == Responsive == */
    @media (max-width: 640px) {
      .modal-box { width: 96vw; height: 92vh; border-radius: 18px; }
      .modal-content { flex-direction: column; }
      .progress-sidebar {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
        max-height: 180px;
      }
      .form-row { flex-direction: column; }
    }
  </style>
</head>

<body>

  <!-- Floating trigger -->
  <button id="chatToggle" aria-label="Open agent chat">&#x1F4AC;</button>

  <!-- Backdrop -->
  <div id="modalBackdrop" aria-hidden="true"></div>

  <!-- Modal -->
  <div id="agentModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">

      <!-- Header -->
      <div class="modal-header">
        <div class="modal-header-text">
          <h2 id="modalTitle">Website Scraper Agent</h2>
          <p>Ask questions about any website</p>
        </div>
        <button id="closeModal" aria-label="Close modal">&#x2715;</button>
      </div>

      <!-- Form strip -->
      <form class="agent-form" id="agentForm">
        <div class="form-row">
          <div class="form-field" style="flex: 1.2;">
            <label for="urlInput">Website URL</label>
            <input
              id="urlInput"
              type="url"
              placeholder="https://books.toscrape.com"
              required
            />
          </div>

          <div class="form-field" style="flex: 2;">
            <label for="questionInput">Question</label>
            <textarea
              id="questionInput"
              placeholder="Summarize this website as bullet points"
              required
            ></textarea>
          </div>

          <div class="form-actions">
            <button id="sendButton" type="submit">Ask Agent</button>
            <button id="thinkingToggle" type="button">
              <span class="status-dot"></span>
              <span id="thinkingText">Thinking</span>
              <span>&#x25BE;</span>
            </button>
          </div>
        </div>
      </form>

      <!-- Split content -->
      <div class="modal-content">

        <!-- Agent progress sidebar -->
        <aside class="progress-sidebar">
          <h3>Agent Progress</h3>
          <ol id="progressList"></ol>
        </aside>

        <!-- Answer area -->
        <div class="answer-panel">
          <div class="answer-scroll">
            <div id="errorBox"></div>
            <div id="answerPlaceholder">Your answer will appear here once you submit a question.</div>
            <article id="answer"></article>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>

  <script>
    /* ── Config ───────────────────────────────────────────────── */
    // Change this single value when deploying.
    const PRODUCTION_API_BASE_URL = "https://api.example.com";

    var API_BASE_URL = (
      location.hostname === "localhost" || location.hostname === "127.0.0.1"
        ? "http://127.0.0.1:8000"
        : PRODUCTION_API_BASE_URL
    );
    var SSE_URL = API_BASE_URL.replace(/\/$/, "") + "/chat/stream";

    /* ── DOM refs ─────────────────────────────────────────────── */
    var chatToggle       = document.getElementById("chatToggle");
    var modalBackdrop    = document.getElementById("modalBackdrop");
    var agentModal       = document.getElementById("agentModal");
    var closeModalBtn    = document.getElementById("closeModal");
    var agentForm        = document.getElementById("agentForm");
    var urlInput         = document.getElementById("urlInput");
    var questionInput    = document.getElementById("questionInput");
    var sendButton       = document.getElementById("sendButton");
    var thinkingToggle   = document.getElementById("thinkingToggle");
    var thinkingText     = document.getElementById("thinkingText");
    var progressList     = document.getElementById("progressList");
    var answerEl         = document.getElementById("answer");
    var answerPlaceholder = document.getElementById("answerPlaceholder");
    var errorBox         = document.getElementById("errorBox");
    var progressSidebar  = document.querySelector(".progress-sidebar");

    /* ── Modal open / close ───────────────────────────────────── */
    function openModal() {
      modalBackdrop.classList.add("open");
      agentModal.classList.add("open");
      document.body.style.overflow = "hidden";
      urlInput.focus();
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      agentModal.classList.remove("open");
      document.body.style.overflow = "";
    }

    chatToggle.addEventListener("click", openModal);
    closeModalBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", closeModal);

    agentModal.addEventListener("click", function (e) {
      if (e.target === agentModal) {
        closeModal();
      }
    });

    document.querySelector(".modal-box").addEventListener("click", function (e) {
      e.stopPropagation();
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && agentModal.classList.contains("open")) {
        closeModal();
      }
    });

    /* ── Progress sidebar toggle ──────────────────────────────── */
    thinkingToggle.addEventListener("click", function () {
      progressSidebar.style.display =
        progressSidebar.style.display === "none" ? "" : "none";
    });

    /* ── UI helpers ───────────────────────────────────────────── */
    function resetUI() {
      answerEl.innerHTML = "";
      answerPlaceholder.style.display = "block";
      errorBox.classList.remove("visible");
      errorBox.textContent = "";
      progressList.innerHTML = "";
      progressSidebar.style.display = "";
      thinkingToggle.classList.add("visible");
      thinkingText.textContent = "Thinking";
    }

    function addProgress(message) {
      var item = document.createElement("li");
      item.textContent = message;
      progressList.appendChild(item);
      progressList.scrollTop = progressList.scrollHeight;
    }

    function renderMarkdown(markdown) {
      var html = marked.parse(markdown);
      answerEl.innerHTML = DOMPurify.sanitize(html);
      answerPlaceholder.style.display = "none";
      /* Auto-scroll answer panel to bottom */
      answerEl.closest(".answer-scroll").scrollTop =
        answerEl.closest(".answer-scroll").scrollHeight;
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("visible");
      thinkingText.textContent = "Failed";
    }

    /* ── SSE line parser ──────────────────────────────────────── */
    /**
     * Parse a single SSE "block" (text between two blank lines) into
     * { eventType, eventData }.  Correctly handles the RFC 8895 field
     * format where "data: " (with a trailing space) is 6 chars, so we
     * slice from index 6, not 5.
     */
    function parseSseBlock(block) {
      var lines     = block.split("\n");
      var eventType = "message"; /* SSE default when no event: field */
      var dataLines = [];

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.startsWith("event:")) {
          /* Strip "event:" plus an optional single space */
          eventType = line.slice(6).replace(/^ /, "").trim();
        } else if (line.startsWith("data:")) {
          /* Strip "data:" plus an optional single space (RFC 8895 §3.3) */
          dataLines.push(line.slice(5).replace(/^ /, ""));
        }
        /* Ignore id:, retry:, and comment lines (:) */
      }

      /* Join multi-line data values with newline, per spec */
      var eventData = dataLines.join("\n");
      return { eventType: eventType, eventData: eventData };
    }

    /* ── Form submit / streaming ──────────────────────────────── */
    agentForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      var url      = urlInput.value.trim();
      var question = questionInput.value.trim();
      if (!url || !question) return;

      resetUI();

      /* Clear only the question field; preserve URL for convenience */
      questionInput.value = "";

      sendButton.disabled    = true;
      sendButton.textContent = "Working\u2026"; /* "Working…" */

      var answerBuffer = "";
      var sseBuffer    = "";

      try {
        /* ── 1. POST request ──────────────────────────────────── */
        var response = await fetch(SSE_URL, {
          method:  "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept":       "text/event-stream"
          },
          body: JSON.stringify({ url: url, question: question })
        });

        if (!response.ok) {
          throw new Error(
            "Server error " + response.status + ": " + response.statusText
          );
        }

        /* ── 2. Stream reader ─────────────────────────────────── */
        var reader        = response.body.getReader();
        var decoder       = new TextDecoder();
        var doneStreaming  = false;

        while (!doneStreaming) {
          var chunk = await reader.read();

          /* Underlying stream closed before a done event — treat as done */
          if (chunk.done) break;

          /* Accumulate raw bytes, normalise all line-endings to \n */
          sseBuffer += decoder.decode(chunk.value, { stream: true });
          sseBuffer  = sseBuffer.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

          /* SSE blocks are separated by a blank line (\n\n) */
          var blocks = sseBuffer.split("\n\n");

          /* The last element is an incomplete block — hold it for next chunk */
          sseBuffer = blocks.pop() || "";

          /* ── 3. Dispatch events ─────────────────────────────── */
          for (var b = 0; b < blocks.length; b++) {
            var block = blocks[b].trim();
            if (!block) continue; /* skip empty separators */

            var parsed    = parseSseBlock(block);
            var eventType = parsed.eventType;
            var eventData = parsed.eventData;

            if (eventType === "progress" && eventData) {
              /* Append one step to the Agent Progress sidebar */
              addProgress(eventData);

            } else if (
              (eventType === "answer" || eventType === "message") && eventData
            ) {
              /* Stream answer text into the markdown panel */
              answerBuffer += eventData;
              renderMarkdown(answerBuffer);

            } else if (
              eventType === "done" || eventData === "[DONE]"
            ) {
              /* Mark run complete and exit the read loop */
              thinkingText.textContent = "Done";
              doneStreaming = true;
              break;

            } else if (eventType === "error" && eventData) {
              /* Surface backend error in the UI */
              throw new Error(eventData);
            }
          }
        }
      } catch (err) {
        showError(
          err.message ||
          "Something went wrong. Make sure the FastAPI server is running."
        );
      } finally {
        /* Always re-enable the submit button regardless of outcome */
        sendButton.disabled    = false;
        sendButton.textContent = "Ask Agent";
      }
    });
  </script>
</body>
</html>
